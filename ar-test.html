<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Minimal HIRO AR test (no project scripts)</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #222; }
    a-scene { width: 100vw; height: 100vh; display: block; }
    .note {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 10;
      padding: 10px;
      background: #fef08a;
      font: 14px system-ui, sans-serif;
      color: #422006;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/aframe@1.2.0/dist/aframe.min.js?v=markerfix-18"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js?v=markerfix-18"></script>
</head>
<body>
  <div class="note">
    <strong>markerfix-18 minimal test</strong> — only A-Frame + AR.js + red box. If this is <strong>still black</strong>, the problem is browser/GPU/site policy, not generator code.
    <a href="index.html?v=markerfix-18">← Back to form</a>
  </div>
  <a-scene id="ar-scene" embedded vr-mode-ui="enabled: false" renderer="alpha: true; antialias: true" arjs="sourceType: webcam; trackingMethod: best; debugUIEnabled: false;">
    <a-marker preset="hiro">
      <a-box position="0 0.5 0" color="#ef4444" depth="0.4" height="0.4" width="0.4"></a-box>
    </a-marker>
    <a-entity camera></a-entity>
  </a-scene>
  <script src="ar-canvas-sync.js?v=markerfix-18"></script>
</body>
</html>
