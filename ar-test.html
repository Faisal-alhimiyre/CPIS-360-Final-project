<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Minimal HIRO AR test (no project scripts)</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #222; }
    #arjs-video {
      position: fixed !important;
      left: 0 !important;
      top: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      object-fit: cover !important;
      opacity: 1 !important;
      visibility: visible !important;
      z-index: 1 !important;
      margin: 0 !important;
    }
    #ar-scene { position: fixed; inset: 0; width: 100%; height: 100%; display: block; z-index: 2; }
    .note {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 10;
      padding: 10px;
      background: #fef08a;
      font: 14px system-ui, sans-serif;
      color: #422006;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/aframe@1.2.0/dist/aframe.min.js?v=markerfix-24"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.2/aframe/build/aframe-ar.js?v=markerfix-24"></script>
</head>
<body>
  <script>
    (function () {
      try {
        var want = 'markerfix-24';
        var u = new URL(window.location.href);
        if (u.searchParams.get('v') !== want) {
          u.searchParams.set('v', want);
          u.searchParams.set('c', String(Date.now()));
          window.location.replace(u.href);
        }
      } catch (e) {}
    })();
  </script>
  <div class="note">
    <strong>markerfix-24 minimal test</strong> — marker AR: <code>videoTexture: false</code>, lifted <code>#arjs-video</code>, A-Frame 1.2.0 + AR.js 3.4.2.
    <a href="index.html?v=realestate-3">← Back to form</a>
  </div>
  <a-scene
    id="ar-scene"
    vr-mode-ui="enabled: false"
    renderer="alpha: true; antialias: true"
    arjs="sourceType: webcam; videoTexture: false; trackingMethod: best; detectionMode: mono; facingMode: environment; sourceWidth: 1280; sourceHeight: 720; debugUIEnabled: false;"
  >
    <a-marker type="pattern" url="data/patt.hiro">
      <a-box position="0 0.5 0" color="#ef4444" depth="0.4" height="0.4" width="0.4"></a-box>
    </a-marker>
    <a-entity camera></a-entity>
  </a-scene>
  <script src="ar-stack.js?v=markerfix-25"></script>
</body>
</html>
