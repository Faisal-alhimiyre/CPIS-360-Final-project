<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <title>AR camera — Building visualizer</title>
  <!-- Inline layout only: avoids CSS conflicts. Flex + min-height:0 fixes embedded a-scene height. -->
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #000;
    }
    /* AR.js + artoolkit assume a full-viewport source; embedded flex slices often stay black. */
    #ar-scene {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      z-index: 0;
    }
    .ar-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px 12px;
      padding: 10px 12px;
      padding-top: max(10px, env(safe-area-inset-top, 0px));
      background: rgba(224, 242, 254, 0.96);
      border-bottom: 2px solid #0369a1;
      font: 14px system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: #0c4a6e;
    }
    .ar-bar a {
      font-weight: 700;
      color: #6d28d9;
      text-decoration: none;
      flex-shrink: 0;
    }
    .ar-bar a:hover {
      text-decoration: underline;
    }
    .ar-bar #ar-tracking-hint {
      flex: 1 1 200px;
      min-width: 0;
    }
    #ar-page-error {
      flex: 1 0 100%;
      margin: 0;
      font-weight: 600;
      color: #9d174d;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/aframe@1.2.0/dist/aframe.min.js?v=markerfix-23"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js?v=markerfix-23"></script>
</head>
<body>
  <script>
    (function () {
      try {
        var want = 'markerfix-23';
        var u = new URL(window.location.href);
        if (u.searchParams.get('v') !== want) {
          u.searchParams.set('v', want);
          u.searchParams.set('c', String(Date.now()));
          window.location.replace(u.href);
        }
      } catch (e) {}
    })();
  </script>
  <div class="ar-bar">
    <a href="index.html?v=markerfix-23">← Edit building</a>
    <span id="ar-tracking-hint">Point at the HIRO marker. Tap the door for a transparent front wall.</span>
    <p id="ar-page-error" role="alert"></p>
  </div>

  <a-scene
    id="ar-scene"
    vr-mode-ui="enabled: false"
    renderer="alpha: true; antialias: true"
    arjs="sourceType: webcam; videoTexture: true; trackingMethod: best; debugUIEnabled: false;"
  >
    <a-marker preset="hiro" id="hiro-marker" emitevents="true">
      <a-entity id="building-root" position="0 0 0"></a-entity>
    </a-marker>
    <a-entity id="ar-camera" camera>
      <a-cursor
        id="ar-cursor"
        raycaster="objects: .clickable; far: 25"
        fuse="false"
        scale="0.01 0.01 0.01"
        color="#4CC3D9"
        animation__click="property: scale; startEvents: click; easing: easeInCubic; dur: 150; from: 0.1 0.1 0.1; to: 0.01 0.01 0.01"
      ></a-cursor>
    </a-entity>
  </a-scene>

  <script src="generator.js?v=markerfix-23"></script>
  <script src="interactions.js?v=markerfix-23"></script>
  <script src="ui.js?v=markerfix-23"></script>
  <script src="app-core.js?v=markerfix-23"></script>
  <script src="ar-scene.js?v=markerfix-23"></script>
  <script src="ar-page.js?v=markerfix-23"></script>
</body>
</html>
