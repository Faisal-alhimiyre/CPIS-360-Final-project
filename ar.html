<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <title>AR camera — Building visualizer</title>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #000;
    }
    /* AR.js appends #arjs-video to body with inline z-index:-2; lift feed above body bg. */
    #arjs-video {
      position: fixed !important;
      left: 0 !important;
      top: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      object-fit: cover !important;
      opacity: 1 !important;
      visibility: visible !important;
      z-index: 1 !important;
      margin: 0 !important;
    }
    /* Transparent WebGL canvas above the live video. */
    #ar-scene {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      z-index: 2;
    }
    .ar-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px 12px;
      padding: 10px 12px;
      padding-top: max(10px, env(safe-area-inset-top, 0px));
      background: rgba(224, 242, 254, 0.96);
      border-bottom: 2px solid #0369a1;
      font: 14px system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: #0c4a6e;
    }
    .ar-bar a {
      font-weight: 700;
      color: #6d28d9;
      text-decoration: none;
      flex-shrink: 0;
    }
    .ar-bar a:hover {
      text-decoration: underline;
    }
    .ar-bar #ar-tracking-hint {
      flex: 1 1 200px;
      min-width: 0;
    }
    #ar-page-error {
      flex: 1 0 100%;
      margin: 0;
      font-weight: 600;
      color: #9d174d;
    }
    .ar-spin {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
      align-items: center;
    }
    .ar-spin button {
      min-width: 40px;
      padding: 6px 10px;
      font-size: 18px;
      line-height: 1;
      border: 1px solid #0369a1;
      border-radius: 8px;
      background: #fff;
      color: #0c4a6e;
      cursor: pointer;
      touch-action: manipulation;
    }
    .ar-spin button:active {
      background: #e0f2fe;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/aframe@1.2.0/dist/aframe.min.js?v=markerfix-24"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.2/aframe/build/aframe-ar.js?v=markerfix-24"></script>
</head>
<body>
  <script>
    (function () {
      try {
        var want = 'markerfix-24';
        var u = new URL(window.location.href);
        if (u.searchParams.get('v') !== want) {
          u.searchParams.set('v', want);
          u.searchParams.set('c', String(Date.now()));
          window.location.replace(u.href);
        }
      } catch (e) {}
    })();
  </script>
  <div class="ar-bar">
    <a href="index.html?v=realestate-3">← Edit building</a>
    <div class="ar-spin" role="group" aria-label="Rotate model in place">
      <button type="button" id="btn-spin-ccw" title="Turn left">⟲</button>
      <button type="button" id="btn-spin-cw" title="Turn right">⟳</button>
    </div>
    <span id="ar-tracking-hint">Aim at the printed marker until the model appears. Tap the orange door to remove the front layer and roof (inside view). Tap again to close.</span>
    <p id="ar-page-error" role="alert"></p>
  </div>

  <a-scene
    id="ar-scene"
    vr-mode-ui="enabled: false"
    renderer="alpha: true; antialias: true"
    arjs="sourceType: webcam; videoTexture: false; trackingMethod: best; debugUIEnabled: false;"
  >
    <a-marker preset="hiro" id="hiro-marker" emitevents="true">
      <!-- Strong presentation tilt so initial view shows the front/door (not the roof). -->
      <a-entity id="building-root" position="0 0.06 0" rotation="-68 0 0">
        <a-entity id="building-mount" position="0 0 0" rotation="0 0 0"></a-entity>
      </a-entity>
    </a-marker>
    <a-entity id="ar-camera" camera>
      <a-cursor
        id="ar-cursor"
        raycaster="objects: .clickable; far: 40"
        ray-origin="mouse"
        fuse="false"
        scale="0.01 0.01 0.01"
        color="#4CC3D9"
        animation__click="property: scale; startEvents: click; easing: easeInCubic; dur: 150; from: 0.1 0.1 0.1; to: 0.01 0.01 0.01"
      ></a-cursor>
    </a-entity>
  </a-scene>

  <script src="generator.js?v=realestate-4"></script>
  <script src="interactions.js?v=realestate-4"></script>
  <script src="ui.js?v=realestate-3"></script>
  <script src="app-core.js?v=realestate-3"></script>
  <script src="ar-scene.js?v=realestate-3"></script>
  <script src="ar-stack.js?v=markerfix-24"></script>
  <script src="ar-rotate.js?v=realestate-4"></script>
  <script src="ar-page.js?v=realestate-4"></script>
</body>
</html>
