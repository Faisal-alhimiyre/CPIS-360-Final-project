<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>3D apartment preview</title>
  <style>
    html,
    body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #b8bcc4;
      font: 14px system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }
    #viewer-scene {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    .viewer-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px 12px;
      padding: 10px 12px;
      padding-top: max(10px, env(safe-area-inset-top, 0px));
      background: rgba(248, 250, 252, 0.94);
      border-bottom: 1px solid #94a3b8;
      color: #0f172a;
    }
    .viewer-bar a {
      font-weight: 700;
      color: #6d28d9;
      text-decoration: none;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/aframe@1.2.0/dist/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-orbit-controls@1.3.2/dist/aframe-orbit-controls.min.js"></script>
</head>
<body>
  <div class="viewer-bar">
    <a href="index.html?v=realestate-3">← Edit building</a>
    <span id="viewer-hint">Drag to orbit · pinch/scroll to zoom · tap a room, then tap the floor to move it</span>
    <p id="viewer-error" role="alert" style="margin:0;color:#9d174d;font-weight:600"></p>
  </div>

  <a-scene
    id="viewer-scene"
    embedded
    background="color: #b8bcc4"
    renderer="antialias: true; colorManagement: true; physicallyCorrectLights: true"
  >
    <a-entity light="type: ambient; color: #ffffff; intensity: 0.72"></a-entity>
    <a-entity light="type: directional; color: #ffffff; intensity: 0.9" position="4 8 6"></a-entity>
    <a-entity light="type: directional; color: #e2e8f0; intensity: 0.35" position="-5 3 -4"></a-entity>

    <a-entity id="building-mount" position="0 0 0"></a-entity>

    <a-entity id="camera-rig" position="0 0 0">
      <a-camera
        id="viewer-camera"
        position="0 5.5 9"
        look-controls="enabled: false"
        wasd-controls="enabled: false"
        orbit-controls="target: 0 0.45 0; minDistance: 4; maxDistance: 28; enablePan: true; enableZoom: true; rotateSpeed: 0.45"
      ></a-camera>
    </a-entity>
  </a-scene>

  <script src="generator.js?v=realestate-14"></script>
  <script src="room-relocate.js?v=realestate-3"></script>
  <script src="viewer-app-core.js?v=1"></script>
  <script src="ui.js?v=realestate-7"></script>
  <script src="viewer-page.js?v=1"></script>
</body>
</html>
